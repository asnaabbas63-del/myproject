<!DOCTYPE html>
<html>
<head>
    <title>Palakkad KSRTC Finder</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="hero">
    <div class="overlay"></div>

    <nav>
        <div class="logo">KSRTC</div>
        <div class="menu">
            <a href="#">Home</a>
            <a href="#">Routes</a>
            <a href="#">About</a>
        </div>
    </nav>

    <div class="hero-content">
        <h1>PALAKKAD</h1>
        <p>Find KSRTC buses instantly</p>

        <form action="/search" method="POST" class="search-box">
            <select name="stop">
                {% for stop in stops %}
                <option>{{ stop }}</option>
                {% endfor %}
            </select>
            <button type="submit">SEARCH BUS</button>
        </form>
    </div>
</div>

</body>
</html>
